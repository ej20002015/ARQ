apiVersion: v1
kind: Service
metadata:
  name: arq-gateway-svc
  labels:
    app: arq-gateway
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "arq-gateway-${ENV_NAME}"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http-web
      protocol: TCP
      name: http
  selector:
    app: arq-gateway